<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chess Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 20% 10%,#1a0a30 0%,#050010 60%,#000 100%);
      font-family:'Inter',sans-serif;color:#d4c0ff;padding:20px 16px}
    h1{font-family:'Cinzel',serif;font-size:1.6rem;color:#b090ff;letter-spacing:3px;text-shadow:0 0 20px rgba(150,100,255,.4)}

    /* top nav */
    .nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;
      border-bottom:1px solid #2a1a50;padding-bottom:14px}
    .nav-title{display:flex;align-items:center;gap:10px}
    .nav-links{display:flex;gap:10px}
    .nav-btn{font-family:'Cinzel',serif;font-size:.75rem;color:#a080e0;
      background:rgba(80,40,120,.4);border:1px solid #4a2a80;
      padding:6px 14px;border-radius:6px;text-decoration:none;cursor:pointer;letter-spacing:1px;transition:.2s}
    .nav-btn:hover{border-color:#b090ff;color:#d4c0ff}
    .nav-btn.danger{color:#ff8080;border-color:#602020}
    .nav-btn.danger:hover{background:rgba(120,20,20,.4);border-color:#ff6060}

    /* login gate */
    .gate{background:rgba(30,10,60,.8);border:1.5px solid #4a2a80;border-radius:12px;
      padding:32px;max-width:360px;margin:60px auto;text-align:center}
    .gate h2{font-family:'Cinzel',serif;font-size:1.2rem;color:#b090ff;margin-bottom:16px;letter-spacing:2px}
    input.key-input{width:100%;background:rgba(255,255,255,.05);border:1.5px solid #4a2a80;
      border-radius:6px;padding:10px 14px;color:#d4c0ff;font-size:.9rem;outline:none;letter-spacing:2px}
    input.key-input:focus{border-color:#b090ff}
    .gate-btn{width:100%;margin-top:14px;padding:11px;border:none;border-radius:7px;cursor:pointer;
      font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:2px;
      background:linear-gradient(135deg,#6030c0,#3010a0);color:#fff;transition:.2s}
    .gate-btn:hover{background:linear-gradient(135deg,#8050e0,#5020c0)}
    .gate-err{color:#ff8080;font-size:.82rem;margin-top:8px;min-height:18px}

    /* stats grid */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
    .stat-card{background:linear-gradient(145deg,rgba(50,20,100,.8),rgba(10,5,30,.9));
      border:1.5px solid #3a1a70;border-radius:12px;padding:20px;text-align:center;
      box-shadow:0 4px 20px rgba(0,0,0,.4)}
    .stat-card .val{font-family:'Cinzel',serif;font-size:2.2rem;color:#b090ff;line-height:1}
    .stat-card .lbl{font-size:.72rem;color:#7a5aa0;letter-spacing:1.5px;text-transform:uppercase;margin-top:6px}
    .stat-card.live .val{color:#80e0a0}
    .stat-card.gold .val{color:#f0c870}

    /* table */
    .section{background:rgba(30,10,60,.8);border:1.5px solid #3a1a70;border-radius:12px;
      padding:20px;margin-bottom:20px}
    .section-title{font-family:'Cinzel',serif;font-size:.88rem;color:#8060c0;
      letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;
      border-bottom:1px solid #2a1a50;padding-bottom:8px}
    table{width:100%;border-collapse:collapse}
    th{font-family:'Cinzel',serif;font-size:.72rem;color:#7a5aa0;letter-spacing:1px;
      text-align:left;padding:8px 10px;border-bottom:1px solid #2a1a50;text-transform:uppercase}
    td{font-size:.85rem;padding:10px 10px;border-bottom:1px solid rgba(60,30,100,.3);color:#c0a0f0}
    tr:hover td{background:rgba(80,40,120,.15)}
    td:first-child{font-family:'Cinzel',serif;color:#d4c0ff}
    .badge-level{background:linear-gradient(135deg,#6030c0,#3010a0);
      padding:2px 8px;border-radius:10px;font-size:.72rem;color:#fff}
    .badge-streak{background:rgba(200,80,20,.3);border:1px solid #c85010;
      padding:2px 8px;border-radius:10px;font-size:.72rem;color:#ff9060}

    /* refresh */
    .refresh-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .refresh-btn{font-family:'Cinzel',serif;font-size:.78rem;
      background:linear-gradient(135deg,#4020a0,#20107a);border:none;
      color:#c0a0ff;padding:8px 18px;border-radius:6px;cursor:pointer;letter-spacing:1px;transition:.2s}
    .refresh-btn:hover{background:linear-gradient(135deg,#6030c0,#3010a0)}
    .last-refresh{font-size:.75rem;color:#5a3a80}
    .pulse{display:inline-block;width:8px;height:8px;background:#80e0a0;
      border-radius:50%;margin-right:5px;animation:pulseAnim 1.5s infinite}
    @keyframes pulseAnim{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

    .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(180,140,255,.3);
      border-top-color:#b090ff;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none}
    .rank-1{color:#f0c870} .rank-2{color:#c0c0c0} .rank-3{color:#c87040}
  </style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate-panel">
  <div class="gate">
    <div style="font-size:2rem;margin-bottom:8px">🛡️</div>
    <h2>ADMIN ACCESS</h2>
    <p style="font-size:.8rem;color:#7a5aa0;margin-bottom:16px">Enter admin key to continue</p>
    <input class="key-input" id="admin-key" type="password" placeholder="Admin key" />
    <button class="gate-btn" onclick="verifyAdmin()">ENTER</button>
    <div class="gate-err" id="gate-err"></div>
    <div style="margin-top:14px"><a href="index.html" style="font-size:.78rem;color:#5a3a80;text-decoration:none">← Back to Game</a></div>
  </div>
</div>

<!-- DASHBOARD (hidden until key verified) -->
<div id="dashboard" class="hidden">
  <div class="nav">
    <div class="nav-title">
      <span style="font-size:1.5rem">♔</span>
      <h1>ADMIN DASHBOARD</h1>
    </div>
    <div class="nav-links">
      <a href="index.html"  class="nav-btn">◀ Game</a>
      <a href="profile.html" class="nav-btn">Profile</a>
      <button onclick="adminLogout()" class="nav-btn danger">Lock</button>
    </div>
  </div>

  <div class="refresh-row">
    <button class="refresh-btn" onclick="loadStats()">↺ Refresh</button>
    <span class="last-refresh" id="last-refresh">—</span>
    <span id="live-dot" style="display:none"><span class="pulse"></span><span style="font-size:.75rem;color:#80e0a0">LIVE</span></span>
  </div>

  <!-- Stats cards -->
  <div class="stats-grid" id="stat-cards">
    <div class="stat-card"><div class="spinner"></div><div class="lbl">Loading...</div></div>
  </div>

  <!-- Top players table -->
  <div class="section">
    <div class="section-title">🏆 Top Players</div>
    <div id="table-wrap"><div style="text-align:center;padding:20px"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
const API      = 'http://localhost:4000/api/auth';
const ADMIN_KEY_STORE = 'chess_admin_verified';
let   adminKey = '';
let   autoTimer = null;

// ── Verify admin key ──────────────────────────────────────────────────────────
function verifyAdmin() {
  const key = document.getElementById('admin-key').value.trim();
  if (!key) return;
  adminKey = key;
  loadStats(true);
}

document.getElementById('admin-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') verifyAdmin();
});

// Auto-login if key stored in session
const storedKey = sessionStorage.getItem(ADMIN_KEY_STORE);
if (storedKey) { adminKey = storedKey; showDashboard(); }

function showDashboard() {
  document.getElementById('gate-panel').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('live-dot').style.display = 'inline-flex';
  loadStats();
  autoTimer = setInterval(loadStats, 30000); // auto-refresh every 30s
}

function adminLogout() {
  sessionStorage.removeItem(ADMIN_KEY_STORE);
  adminKey = '';
  clearInterval(autoTimer);
  document.getElementById('gate-panel').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
}

// ── Load stats from server ────────────────────────────────────────────────────
async function loadStats(firstLoad = false) {
  try {
    const res  = await fetch(API + '/admin/stats', {
      headers: { 'x-admin-key': adminKey }
    });
    if (res.status === 403) {
      document.getElementById('gate-err').textContent = 'Wrong admin key';
      return;
    }
    const data = await res.json();
    if (firstLoad) { sessionStorage.setItem(ADMIN_KEY_STORE, adminKey); showDashboard(); }
    renderStats(data);
  } catch(e) {
    if (firstLoad) document.getElementById('gate-err').textContent = 'Cannot reach server';
  }
}

function renderStats(d) {
  // Cards
  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card live">
      <div class="val">${d.activePlayers}</div>
      <div class="lbl">🟢 Active Now</div>
    </div>
    <div class="stat-card gold">
      <div class="val">${d.totalUsers}</div>
      <div class="lbl">👥 Total Players</div>
    </div>
    <div class="stat-card">
      <div class="val">${d.topPlayers?.reduce((s,p)=>s+p.wins,0)||0}</div>
      <div class="lbl">🏆 Total Wins</div>
    </div>
    <div class="stat-card">
      <div class="val">${d.topPlayers?.[0]?.username||'—'}</div>
      <div class="lbl">👑 Top Player</div>
    </div>
  `;

  // Table
  const rows = (d.topPlayers || []).map((p, i) => `
    <tr>
      <td class="rank-${i+1}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#'+(i+1)}</td>
      <td>${p.username}</td>
      <td><span class="badge-level">Lv.${p.level||1}</span></td>
      <td style="color:#80e080">${p.wins}</td>
      <td style="color:#f0c870">🪙 ${p.coins}</td>
      <td>${p.winStreak >= 2 ? '<span class="badge-streak">🔥 '+p.winStreak+'</span>' : p.winStreak}</td>
    </tr>
  `).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Rank</th><th>Player</th><th>Level</th><th>Wins</th><th>Coins</th><th>Streak</th>
      </tr></thead>
      <tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:#5a3a80;padding:20px">No players yet</td></tr>'}</tbody>
    </table>
  `;

  document.getElementById('last-refresh').textContent =
    'Last updated: ' + new Date().toLocaleTimeString('en-IN');
}
</script>
</body>
</html>
