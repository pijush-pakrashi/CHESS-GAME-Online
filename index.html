<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Engine</title>
  <meta name="description" content="A beautiful wooden chess engine with Staunton pieces and AI opponent support.">
  <link rel="stylesheet" href="style.css">
  <script>
    // ── Auth Guard: redirect to login if not logged in ──────────────────────
    (function() {
      const token = localStorage.getItem('chess_token');
      const user  = localStorage.getItem('chess_user');
      if (!token || !user) {
        window.location.replace('auth.html');
      }
    })();
  </script>


<body>

  <!-- ── Confetti canvas (hidden until win) ── -->
  <canvas id="confetti-canvas"
    style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99999;display:none"></canvas>

  <!-- ── Coin reward popup ── -->
  <div id="coin-popup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#5a3800,#3a2000);border:2px solid #c8900a;border-radius:30px;
  padding:14px 32px;font-family:'Cinzel',serif;font-size:1.5rem;color:#f0c870;
  box-shadow:0 0 40px rgba(200,145,10,.6);z-index:100000;
  animation:none"></div>

  <!-- ── User Header Bar ── -->
  <div id="user-header" style="width:70vmin;min-width:280px;padding:4px 0">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:1.2rem">♟</span>
        <span id="header-username" style="font-family:'Cinzel',serif;font-size:.85rem;color:#f0c870;letter-spacing:1px">Guest</span>
        <span id="header-level"    style="font-family:'Cinzel',serif;font-size:.72rem;color:#fff;background:linear-gradient(135deg,#c8900a,#8b5e10);padding:2px 8px;border-radius:10px;display:none">Lv.1</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="header-coins" style="font-family:'Cinzel',serif;font-size:.82rem;color:#d4a84a;display:none"></span>
        <a id="header-profile-btn" href="profile.html"
          style="display:none;font-family:'Cinzel',serif;font-size:.72rem;color:#f0c870;
          background:linear-gradient(135deg,#5c3010,#3a1e08);border:1px solid #7a4810;
          padding:4px 10px;border-radius:5px;text-decoration:none;letter-spacing:1px;transition:.2s"
          onmouseover="this.style.borderColor='#d4a84a'" onmouseout="this.style.borderColor='#7a4810'">PROFILE</a>
        <button id="header-signout-btn" onclick="signOut()"
          style="display:none;font-family:'Cinzel',serif;font-size:.72rem;color:#ff9060;
          background:rgba(80,20,5,.5);border:1px solid #602010;
          padding:4px 10px;border-radius:5px;cursor:pointer;letter-spacing:1px"
          onmouseover="this.style.borderColor='#ff6040'" onmouseout="this.style.borderColor='#602010'">SIGN OUT</button>
        <a href="auth.html" id="header-login-btn"
          style="font-family:'Cinzel',serif;font-size:.72rem;color:#a07040;
          background:rgba(80,40,10,.5);border:1px solid #4a2808;
          padding:4px 10px;border-radius:5px;text-decoration:none;letter-spacing:1px">LOGIN</a>
      </div>
    </div>
    <!-- XP bar (hidden for guests) -->
    <div id="xp-bar-wrap" style="display:none">
      <div style="background:rgba(255,255,255,.07);border-radius:20px;height:6px;overflow:hidden;margin-bottom:2px">
        <div id="xp-fill" style="height:100%;width:0%;background:linear-gradient(90deg,#c8900a,#f0c870);border-radius:20px;transition:width .8s ease"></div>
      </div>
      <div id="xp-text" style="font-size:.68rem;color:#7a5830;text-align:right;letter-spacing:.5px">0 / 150 XP</div>
    </div>
  </div>


  <!-- ── Shared SVG gradient definitions (referenced by all piece SVGs) ── -->
  <svg xmlns="http://www.w3.org/2000/svg" style="width:0;height:0;position:absolute;overflow:hidden">
    <defs>
      <!-- White: natural boxwood/maple cream -->
      <radialGradient id="wg" cx="28%" cy="20%" r="80%">
        <stop offset="0%" stop-color="#FFFDE8" />
        <stop offset="20%" stop-color="#F5E8A0" />
        <stop offset="55%" stop-color="#D4A840" />
        <stop offset="85%" stop-color="#A07020" />
        <stop offset="100%" stop-color="#7A5010" />
      </radialGradient>
      <!-- Black: deep sherwood/walnut -->
      <radialGradient id="bg" cx="28%" cy="20%" r="80%">
        <stop offset="0%" stop-color="#8C4A28" />
        <stop offset="28%" stop-color="#4E2008" />
        <stop offset="60%" stop-color="#250C02" />
        <stop offset="100%" stop-color="#0A0100" />
      </radialGradient>
      <!-- White linear (rook flat faces) -->
      <linearGradient id="wl" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFFDE8" />
        <stop offset="50%" stop-color="#C8900A" />
        <stop offset="100%" stop-color="#7A5010" />
      </linearGradient>
      <!-- Black linear (rook flat faces) -->
      <linearGradient id="bl" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8C4A28" />
        <stop offset="50%" stop-color="#301205" />
        <stop offset="100%" stop-color="#0A0100" />
      </linearGradient>
    </defs>
  </svg>

  <!-- Game Mode Selector -->
  <div class="gamemode">
    <label for="gameMode">GAME MODE</label>
    <select id="gameMode" onchange="updateGameOptions()">
      <option value="localMultiplayer" selected>Local Multiplayer</option>
      <option value="stockfish">vs Stockfish</option>
      <option value="myai">vs My AI</option>
      <option value="online">🌐 Online (vs Player)</option>
    </select>
    <!-- Online status banner -->
    <div id="online-status" style="display:none;margin-top:8px;font-family:'Cinzel',serif;
      font-size:.78rem;color:#80e080;letter-spacing:1px;text-align:center"></div>
  </div>

  <!-- Black Player Info -->
  <div class="userDetails" id="blackUSer">
    <img class="user" src="/src/users/black-user.jpeg" alt="black-user">
    <div class="turn-and-pieces">
      <div id="player-black" class="player-in-turn">BLACK'S TURN</div>
      <div id="blackCaptured" class="capturedArray"></div>
    </div>
  </div>

  <!-- Board with wooden frame and coordinates -->
  <div id="board-wrapper">
    <div id="board-frame">

      <!-- Top coordinates (A–H) -->
      <div class="coord-row">
        <span class="coord-label"></span>
        <span class="coord-label">A</span>
        <span class="coord-label">B</span>
        <span class="coord-label">C</span>
        <span class="coord-label">D</span>
        <span class="coord-label">E</span>
        <span class="coord-label">F</span>
        <span class="coord-label">G</span>
        <span class="coord-label">H</span>
        <span class="coord-label"></span>
      </div>

      <!-- Middle: left numbers + board + right numbers -->
      <div class="board-row">
        <div class="coord-col">
          <span class="coord-label">8</span>
          <span class="coord-label">7</span>
          <span class="coord-label">6</span>
          <span class="coord-label">5</span>
          <span class="coord-label">4</span>
          <span class="coord-label">3</span>
          <span class="coord-label">2</span>
          <span class="coord-label">1</span>
        </div>
        <div id="gameboard"></div>
        <div class="coord-col">
          <span class="coord-label">8</span>
          <span class="coord-label">7</span>
          <span class="coord-label">6</span>
          <span class="coord-label">5</span>
          <span class="coord-label">4</span>
          <span class="coord-label">3</span>
          <span class="coord-label">2</span>
          <span class="coord-label">1</span>
        </div>
      </div>

      <!-- Bottom coordinates (A–H) -->
      <div class="coord-row">
        <span class="coord-label"></span>
        <span class="coord-label">A</span>
        <span class="coord-label">B</span>
        <span class="coord-label">C</span>
        <span class="coord-label">D</span>
        <span class="coord-label">E</span>
        <span class="coord-label">F</span>
        <span class="coord-label">G</span>
        <span class="coord-label">H</span>
        <span class="coord-label"></span>
      </div>

    </div>
  </div>

  <!-- White Player Info -->
  <div class="userDetails" id="whiteUser">
    <img class="user" src="/src/users/white-user.jpg" alt="white-user">
    <div class="turn-and-pieces">
      <div id="player-white" class="player-in-turn">WHITE'S TURN</div>
      <div id="whiteCaptured" class="capturedArray"></div>
    </div>
  </div>

  <!-- Buttons -->
  <div id="buttonContainer">
    <div id="getAiMove"><button id="btn" type="button" onclick="getAiMove()">Get Help</button></div>
    <div id="newgame"><button id="btn2" type="button" onclick="getinit()">New Game</button></div>
  </div>

  <!-- Overlays -->
  <div id="alert"></div>
  <div id="loader" class="loader" style="display:none;"></div>
  <div id="gameOver" class="gameOver"></div>

  <script src="pices.js?v=2"></script>
  <script src="createBoard.js?v=2"></script>
  <script src="playsound.js?v=2"></script>
  <script src="gameRewards.js?v=2"></script>
  <script src="main.js?v=2"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="online.js?v=2"></script>
  <script>
    // ── Session → header ─────────────────────────────────────────────────────
    (function () {
      const user = JSON.parse(localStorage.getItem('chess_user') || 'null');
      if (!user) return;

      document.getElementById('header-username').textContent = user.username.toUpperCase();
      document.getElementById('header-coins').textContent   = '🪙 ' + user.coins;
      document.getElementById('header-coins').style.display = 'inline';
      document.getElementById('header-level').textContent   = 'Lv.' + (user.level || 1);
      document.getElementById('header-level').style.display = 'inline';
      document.getElementById('header-profile-btn').style.display = 'inline';
      document.getElementById('header-signout-btn').style.display = 'inline';
      document.getElementById('header-login-btn').style.display   = 'none';
      document.getElementById('xp-bar-wrap').style.display = 'block';

      // Show avatar in header next to username
      if (user.avatar) {
        const avatarEl = document.createElement('img');
        avatarEl.src = user.avatar;
        avatarEl.id  = 'header-avatar';
        avatarEl.alt = 'avatar';
        Object.assign(avatarEl.style, {
          width:'30px', height:'30px', borderRadius:'50%',
          border:'1.5px solid #d4a84a', objectFit:'cover',
          verticalAlign:'middle', cursor:'pointer', marginRight:'4px'
        });
        avatarEl.title   = 'View Profile';
        avatarEl.onclick = () => window.location.href = 'profile.html';
        const usernameEl = document.getElementById('header-username');
        usernameEl.parentNode.insertBefore(avatarEl, usernameEl);
      }

      if (typeof updateXPBar === 'function') updateXPBar(user);
    })();

    // ── Sign-out ──────────────────────────────────────────────────────────
    window.signOut = function() {
      localStorage.removeItem('chess_token');
      localStorage.removeItem('chess_user');
      // Do NOT remove chess_saved_game so they can resume after logging back in
      window.location.replace('auth.html');
    };

    // ── Saved game restore banner (logged-in users only) ──────────────────
    window.addEventListener('load', function() {
      if (!localStorage.getItem('chess_token')) return;
      const currentUser = JSON.parse(localStorage.getItem('chess_user') || 'null');
      if (!currentUser) return;
      
      const userId = currentUser.id || currentUser._id;
      const saveKey = `chess_saved_game_${userId}`;
      const saved = localStorage.getItem(saveKey);
      if (!saved) return;
      
      try {
        const data = JSON.parse(saved);
        
        const mins = Math.round((Date.now() - data.savedAt) / 60000);
        if (mins >= 1440) { localStorage.removeItem(saveKey); return; }

        const banner = document.createElement('div');
        banner.id = 'restore-banner';
        banner.innerHTML = `
          <span style="font-family:'Cinzel',serif;font-size:.82rem;color:#f0c870">
            ♟ Game in progress (${mins < 1 ? 'just now' : mins + ' min ago'})
          </span>
          <button onclick="restoreSavedGame()" style="margin-left:10px;font-family:'Cinzel',serif;
            font-size:.72rem;background:linear-gradient(135deg,#c8900a,#8b5e10);border:none;
            color:#fff;padding:4px 12px;border-radius:5px;cursor:pointer">CONTINUE</button>
          <button onclick="clearSavedGame()" style="margin-left:6px;font-family:'Cinzel',serif;
            font-size:.72rem;background:rgba(80,40,10,.5);border:1px solid #4a2808;
            color:#a07040;padding:4px 10px;border-radius:5px;cursor:pointer">DISMISS</button>
        `;
        Object.assign(banner.style, {
          position:'fixed', bottom:'12px', left:'50%', transform:'translateX(-50%)',
          background:'rgba(20,8,0,.96)', border:'1.5px solid #7a4810',
          borderRadius:'10px', padding:'10px 18px', zIndex:'9999',
          display:'flex', alignItems:'center', gap:'4px',
          boxShadow:'0 4px 20px rgba(0,0,0,.7)', whiteSpace:'nowrap'
        });
        document.body.appendChild(banner);
      } catch(e) {}
    });

    window.restoreSavedGame = function() {
      const currentUser = JSON.parse(localStorage.getItem('chess_user') || 'null');
      if (!currentUser) return;
      const userId = currentUser.id || currentUser._id;
      const saveKey = `chess_saved_game_${userId}`;
      const saved = localStorage.getItem(saveKey);
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        if (data.mode) document.getElementById('gameMode').value = data.mode;
        
        // Restore FEN to board
        if (typeof boardState === 'function') {
          boardState(data.fen);
          setupBoardSquares();
          setupPieces();
          fillBoardSquaresArray();
          if (typeof isWhiteTurn !== 'undefined') isWhiteTurn = data.turn;
          playerInTurn();
          
          whiteKingMoved = false;
          blackKingMoved = false;
          whiteRookAMoved = false; 
          whiteRookHMoved = false; 
          blackRookAMoved = false; 
          blackRookHMoved = false; 
          
          document.getElementById("whiteCaptured").innerHTML = "";
          document.getElementById("blackCaptured").innerHTML = "";
          if (typeof hideGameOver === 'function') hideGameOver();
          document.getElementById("loader").style.display = "none";
        }
        
        document.getElementById('restore-banner')?.remove();
      } catch(e) { console.error(e); }
    };

    window.clearSavedGame = function() {
      const currentUser = JSON.parse(localStorage.getItem('chess_user') || 'null');
      if (currentUser) {
        const userId = currentUser.id || currentUser._id;
        localStorage.removeItem(`chess_saved_game_${userId}`);
      }
      document.getElementById('restore-banner')?.remove();
    };

    // ── Ping server every 30s ─────────────────────────────────────────────
    setInterval(() => {
      const token = localStorage.getItem('chess_token');
      if (token) {
        fetch('http://localhost:4000/api/auth/ping', {
          method: 'POST', headers: { Authorization: 'Bearer ' + token }
        }).catch(() => {});
      }
    }, 30000);
  </script>
</body>
</html>
